/* ============ Analytics (anónimo, → n8n) ============ */
const ET_EVENTS_URL = 'https://devn8n.tuescuelademarcas.cl/webhook/et-tools-event';
/* Cola offline: si no hay conexión, el evento se guarda y se reenvía después */
function etEnqueue(p){
  try{
    const q = JSON.parse(localStorage.getItem('et_queue') || '[]');
    q.push(p);
    while (q.length > 200) q.shift();
    localStorage.setItem('et_queue', JSON.stringify(q));
  }catch(e){}
}
function etPost(p){
  return fetch(ET_EVENTS_URL, {
    method: 'POST', keepalive: true,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(p)
  }).then(r => { if (!r.ok) throw new Error('http'); });
}
function etFlushQueue(){
  let q = [];
  try{ q = JSON.parse(localStorage.getItem('et_queue') || '[]'); }catch(e){}
  if (!q.length) return;
  try{ localStorage.setItem('et_queue', '[]'); }catch(e){}
  q.forEach(p => etPost(p).catch(() => etEnqueue(p)));
}
window.addEventListener('online', etFlushQueue);
etFlushQueue();


function etAnonId(){
  let id = localStorage.getItem('et_anon');
  if (!id){
    id = (crypto.randomUUID ? crypto.randomUUID() : 'a-' + Date.now() + '-' + Math.random().toString(36).slice(2));
    localStorage.setItem('et_anon', id);
  }
  return id;
}

function etProfile(){
  try{ return JSON.parse(localStorage.getItem('et_profile') || '{}'); }catch(e){ return {}; }
}

function sendEvent(event, extra){
  try{
    const p = etProfile();
    const __p = {
        ts: new Date().toISOString(),
        anon_id: etAnonId(),
        event: event,
        tool: 'hub',
        lang: LANG,
        country: p.country || '',
        specialty: p.specialty || '',
        tz: (Intl.DateTimeFormat().resolvedOptions().timeZone || ''),
        ua: navigator.userAgent.slice(0, 180),
        extra: extra || {}
      };
    etPost(__p).catch(() => etEnqueue(__p));
  }catch(e){}
}

const LANG_NAMES = { es: "Español", en: "English", pt: "Português" };
const LANGS = ['es', 'en', 'pt'];

function detectLang(){
  const saved = localStorage.getItem('lang');
  if (saved && I18N[saved]) return saved;
  const nav = (navigator.language || 'es').toLowerCase();
  if (nav.startsWith('pt')) return 'pt';
  if (nav.startsWith('en')) return 'en';
  return 'es';
}

let LANG = detectLang();
function T(){ return I18N[LANG]; }

function setLang(lang){
  const changed = lang !== LANG;
  LANG = lang;
  localStorage.setItem('lang', lang);
  const sw = document.getElementById('langSwitch');
  if (sw){
    sw.dataset.active = LANGS.indexOf(lang);
    sw.querySelectorAll('button').forEach((b, i) => {
      b.classList.toggle('active', LANGS[i] === lang);
      b.setAttribute('aria-pressed', LANGS[i] === lang);
    });
    applyStaticTexts();
    if (typeof refreshInstallBanner === 'function') refreshInstallBanner();
    document.getElementById('toolGrid').innerHTML = toolGridHTML();
    document.getElementById('profileZone').innerHTML = profileHTML();
  } else {
    render();
  }
  if (changed) sendEvent('lang_change');
}

function applyStaticTexts(){
  const t = T();
  document.documentElement.lang = t.htmlLang;
  document.getElementById('brandRibbon').textContent = t.ribbon;
  document.getElementById('hubTitle').textContent = t.title;
  document.getElementById('hubSubtitle').textContent = t.subtitle;
  document.getElementById('hubFooter').innerHTML = t.footer;
}

function toolGridHTML(){
  const t = T();
  const cards = t.tools.map(tool => `
    <a class="tool-card" href="${tool.href}" onclick="sendEvent('tool_open', {tool_id:'${tool.id}'})">
      <div class="tool-card-top">
        ${tool.chip ? `<span class="tool-chip"><img src="${tool.chip}" alt="${tool.chipAlt}"></span>` : `<span class="tool-chip" style="border:none;background:none;padding:0;font-size:1.4rem;">${tool.emoji||'🧮'}</span>`}
        <span class="tool-status">${t.available}</span>
      </div>
      <div class="tool-title">${tool.title}</div>
      <p class="tool-desc">${tool.desc}</p>
      <span class="tool-cta">${t.open}</span>
    </a>`).join('');
  return cards + `
    <div class="tool-card soon">
      <div class="tool-title">${t.soonTitle}</div>
      <p class="tool-desc">${t.soonDesc}</p>
    </div>`;
}

function profileHTML(){
  const t = T();
  const p = etProfile();
  if (p.specialty || p.country){
    return `<div class="profile-done" style="margin-top:18px;">
      <span>${t.profileDone}</span>
      <button onclick="editProfile()">${t.edit}</button>
    </div>`;
  }
  return `<button class="hub-link" style="margin-top:14px;" onclick="showProfileSheet()">👤 ${t.profileMini}</button>`;
}

function profileFieldsHTML(){
  const t = T();
  const mandatory = !etProfile().specialty;
  return `
    <h2>${t.profileTitle}</h2>
    <p style="margin:0 0 4px; font-size:0.84rem; color:var(--et-muted); line-height:1.45;">${t.profileDesc}</p>
    <div class="spec-grid">
      ${t.specialties.map(s => `<button onclick="pickSpecialtyHub(this.textContent)">${s}</button>`).join('')}
    </div>
    ${mandatory ? '' : `<button class="fb-skip" onclick="closeProfileSheet(true)">${t.profileSkip}</button>`}`;
}

function pickSpecialtyHub(s){
  const t = T();
  if (s === t.specialties[t.specialties.length - 1]){
    // "Otra" → texto libre dentro de la misma hoja
    const sheet = document.querySelector('#pfOverlay .sheet');
    sheet.innerHTML = `
      <h2>${t.profileTitle}</h2>
      <input class="spec-input" id="specOtherHub" maxlength="60" placeholder="${t.specOtherPh}"
        oninput="document.getElementById('specGoHub').disabled = !this.value.trim()">
      <button class="spec-continue" id="specGoHub" disabled
        onclick="saveSpecialtyHub(document.getElementById('specOtherHub').value.trim())">${t.specContinue}</button>`;
    setTimeout(() => document.getElementById('specOtherHub').focus(), 100);
    return;
  }
  saveSpecialtyHub(s);
}

function saveSpecialtyHub(s){
  if (!s) return;
  localStorage.setItem('et_profile', JSON.stringify({ specialty: s.slice(0, 60) }));
  sendEvent('profile_saved', { specialty: s.slice(0, 60) });
  // Encadena con "¿cómo nos conociste?" (obligatoria) si aún no la respondió
  if (!localStorage.getItem('et_source')){
    showSourceSheet();
  } else {
    closeProfileSheet(false);
  }
}

function closeSourceSheet(){
  const ov = document.getElementById('pfOverlay');
  if (ov) ov.classList.remove('show');
  const z = document.getElementById('profileZone');
  if (z) z.innerHTML = profileHTML();
}

  // elegir un chip nuevo simplemente sobreescribe.
  showProfileSheet();
}

function showProfileSheet(){
  let ov = document.getElementById('pfOverlay');
  if (!ov){
    ov = document.createElement('div');
    ov.id = 'pfOverlay';
    ov.className = 'overlay';
    ov.onclick = (e) => { if (e.target === ov && etProfile().specialty) closeProfileSheet(true); };
    document.body.appendChild(ov);
  }
  ov.innerHTML = `<div class="sheet">${profileFieldsHTML()}</div>`;
  ov.classList.add('show');
}

function closeProfileSheet(dismissed){
  if (dismissed){ try{ localStorage.setItem('et_profile_dismissed', '1'); }catch(e){} }
  const ov = document.getElementById('pfOverlay');
  if (ov) ov.classList.remove('show');
  const z = document.getElementById('profileZone');
  if (z) z.innerHTML = profileHTML();
}

function maybeAskProfile(){
  try{
    if (!etProfile().specialty){ showProfileSheet(); return; }
    // Ya tiene especialidad pero nunca respondió cómo llegó → preguntar (obligatoria)
    if (!localStorage.getItem('et_source')){
      showSourceSheet();
    }
  }catch(e){}
}

function render(){

/* ============ Instalación: prompt nativo (Android) / guía visual (iOS) ============ */
let deferredPrompt = null;
const IS_IOS = /iPhone|iPad|iPod/.test(navigator.userAgent) || (/Macintosh/.test(navigator.userAgent) && 'ontouchend' in document);
const IS_STANDALONE = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;

function refreshInstallBanner(){
  const banner = document.getElementById('installBanner');
  if (!banner) return;
  const t = T();
  if (IS_STANDALONE || localStorage.getItem('installDismissed') === '1'){
    banner.classList.remove('show');
    return;
  }
  const btn = document.getElementById('installBtn');
  if (IS_IOS){
    document.getElementById('installText').innerHTML = t.installIOSShort;
    btn.style.display = '';
    btn.textContent = t.iosHow;
    btn.onclick = showIOSGuide;
    banner.classList.add('show');
  } else if (deferredPrompt){
    document.getElementById('installText').innerHTML = t.installText;
    btn.style.display = '';
    btn.textContent = t.installBtn;
    btn.onclick = promptInstall;
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  refreshInstallBanner();
});
window.addEventListener('appinstalled', () => {
  sendEvent('pwa_installed');
  const b = document.getElementById('installBanner');
  if (b) b.classList.remove('show');
});
function promptInstall(){
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.finally(() => { deferredPrompt = null; refreshInstallBanner(); });
}
function dismissInstall(){
  try{ localStorage.setItem('installDismissed', '1'); }catch(e){}
  document.getElementById('installBanner').classList.remove('show');
}
function showIOSGuide(){
  const t = T();
  let ov = document.getElementById('iosOverlay');
  if (!ov){
    ov = document.createElement('div');
    ov.id = 'iosOverlay';
    ov.className = 'overlay';
    ov.onclick = (e) => { if (e.target === ov) ov.classList.remove('show'); };
    document.body.appendChild(ov);
  }
  ov.innerHTML = `<div class="sheet">
    <h2>${t.iosTitle}</h2>
    ${t.iosSteps.map((s, i) => `<div class="rule-item"><div class="rule-dot"></div><div><b>${i + 1}.</b> ${s}</div></div>`).join('')}
    <button class="close-sheet" onclick="document.getElementById('iosOverlay').classList.remove('show')">${t.iosDone}</button>
  </div>`;
  ov.classList.add('show');
  sendEvent('ios_guide_open');
}
refreshInstallBanner();

// Service worker (solo cachea el hub; /abdomen/ tiene el suyo)
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  const hadController = !!navigator.serviceWorker.controller;
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing || !hadController) return; // recarga UNA vez cuando llega versión nueva
    refreshing = true;
    location.reload();
  });
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then((reg) => {
      reg.update();
      setInterval(() => reg.update(), 60000); // busca actualización cada minuto mientras esté abierta
    }).catch(() => {});
  });
}

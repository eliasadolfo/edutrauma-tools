<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Panel — EduTrauma Tools</title>
<style>
  :root{
    --navy:#00205C; --red:#E02826;
    --ink:#111c33; --muted:#5b6b8c; --line:#e6ebf3; --bg:#eef2f8; --card:#ffffff; --wash:#f5f7fb;
    --go:#1F7A5C; --go-bg:#e9f6f1; --warn:#B7791F; --warn-bg:#fdf6e7; --stop:#C0392B; --stop-bg:#fdecea;
    --r:16px; --r-sm:11px;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{ --ink:#e9eef7; --muted:#93a1bd; --line:#243149; --bg:#0a1020; --card:#131c30; --wash:#0f1728;
      --go-bg:#0f2a22; --warn-bg:#2a2211; --stop-bg:#2a1512; }
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); line-height:1.5; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:1080px; margin:0 auto; padding:24px 20px 80px; }

  header.top{ display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:8px; }
  header.top h1{ font-size:1.5rem; font-weight:800; margin:0; letter-spacing:-.01em; }
  header.top .sub{ font-size:.82rem; color:var(--muted); margin-top:2px; }
  .refresh{ display:inline-flex; align-items:center; gap:7px; background:var(--card); border:1px solid var(--line);
    color:var(--muted); font-family:inherit; font-size:.82rem; font-weight:700; padding:9px 15px; border-radius:999px; cursor:pointer; }
  .refresh:active{ transform:scale(.97); }

  /* Verdict banner */
  .verdict{ display:flex; align-items:flex-start; gap:16px; border-radius:var(--r); padding:20px 24px; margin:16px 0 8px; border:1px solid; }
  .verdict.go{ background:var(--go-bg); border-color:color-mix(in srgb,var(--go) 35%,transparent); }
  .verdict.weak, .verdict.wait{ background:var(--warn-bg); border-color:color-mix(in srgb,var(--warn) 35%,transparent); }
  .verdict.stop{ background:var(--stop-bg); border-color:color-mix(in srgb,var(--stop) 35%,transparent); }
  .verdict .dot{ width:44px; height:44px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.5rem; }
  .verdict.go .dot{ background:var(--go); } .verdict.weak .dot,.verdict.wait .dot{ background:var(--warn); } .verdict.stop .dot{ background:var(--stop); }
  .verdict .lbl{ font-size:.7rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
  .verdict .txt{ font-size:1.15rem; font-weight:800; letter-spacing:-.01em; }
  .verdict.go .txt{ color:var(--go); } .verdict.weak .txt,.verdict.wait .txt{ color:var(--warn); } .verdict.stop .txt{ color:var(--stop); }
  .verdict .v-why{ font-size:.92rem; color:var(--ink); margin-top:8px; line-height:1.55; max-width:76ch; opacity:.82; }
  .verdict .v-why b{ font-weight:800; opacity:1; }
  .verdict .dot{ margin-top:2px; }

  h2{ font-size:.74rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin:34px 0 12px; }

  /* KPI grid */
  .kpis{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .kpi{ background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:18px 20px; }
  .kpi .k-top{ display:flex; align-items:center; justify-content:space-between; }
  .kpi .k-name{ font-size:.8rem; font-weight:700; color:var(--muted); }
  .kpi .k-val{ font-size:2.3rem; font-weight:900; line-height:1.05; margin:6px 0 2px; font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
  .kpi .k-sub{ font-size:.78rem; color:var(--muted); }
  .kpi .k-sub b{ color:var(--ink); font-weight:700; }
  .pill{ font-size:.64rem; font-weight:800; letter-spacing:.03em; text-transform:uppercase; padding:4px 9px; border-radius:999px; white-space:nowrap; }
  .pill.go{ color:var(--go); background:var(--go-bg); } .pill.warn{ color:var(--warn); background:var(--warn-bg); } .pill.stop{ color:var(--stop); background:var(--stop-bg); }

  .grid2{ display:grid; grid-template-columns:1.4fr 1fr; gap:14px; align-items:start; }
  .panel{ background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:20px 22px; }
  .panel h3{ margin:0 0 4px; font-size:1rem; font-weight:800; }
  .panel h3 .pcount{ font-size:.8rem; font-weight:800; color:var(--muted); background:var(--wash); border-radius:999px; padding:2px 9px; margin-left:7px; vertical-align:middle; }
  .panel .hint{ font-size:.78rem; color:var(--muted); margin:0 0 14px; }

  /* bars (single hue = magnitude) */
  .bar-row{ display:grid; grid-template-columns:130px 1fr 46px; align-items:center; gap:12px; padding:7px 0; font-size:.88rem; }
  .bar-row .bn{ font-weight:700; }
  .bar-track{ height:12px; border-radius:6px; background:var(--wash); overflow:hidden; }
  .bar-fill{ height:100%; border-radius:6px; background:var(--navy); }
  .bar-row .bv{ font-variant-numeric:tabular-nums; font-weight:800; text-align:right; }

  /* ratings */
  .rate-row{ display:grid; grid-template-columns:1fr auto; align-items:center; gap:12px; padding:9px 0; border-top:1px solid var(--line); }
  .rate-row:first-child{ border-top:none; }
  .rate-row .rn{ font-weight:700; font-size:.9rem; }
  .rate-val{ display:flex; align-items:center; gap:8px; }
  .rate-num{ font-size:1.3rem; font-weight:900; font-variant-numeric:tabular-nums; }
  .rate-stars{ letter-spacing:1px; font-size:.95rem; }
  .rate-n{ font-size:.72rem; color:var(--muted); }
  .rate-empty{ font-size:.8rem; color:var(--muted); font-style:italic; }

  /* otras (texto libre) */
  .otras-wrap{ margin-top:16px; padding-top:14px; border-top:1px dashed var(--line); }
  .otras-head{ font-size:.72rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  .otras-list{ display:flex; flex-wrap:wrap; gap:8px; }
  .chip{ font-size:.84rem; font-weight:600; background:var(--wash); border:1px solid var(--line); border-radius:999px; padding:5px 12px; color:var(--ink); }
  .chip .cn{ color:var(--muted); font-weight:800; margin-left:5px; }
  .chip.mute{ color:var(--muted); font-style:italic; font-weight:500; }

  /* sparkline */
  .spark-wrap{ margin-top:6px; }
  .spark-cap{ display:flex; justify-content:space-between; font-size:.72rem; color:var(--muted); margin-top:6px; }

  /* peticiones */
  .pet{ background:var(--wash); border:1px solid var(--line); border-radius:var(--r-sm); padding:13px 15px; margin-bottom:10px; }
  .pet .p-top{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:5px; }
  .p-tag{ font-size:.64rem; font-weight:800; letter-spacing:.03em; text-transform:uppercase; padding:3px 8px; border-radius:6px; }
  .p-tag.mejora{ color:var(--warn); background:var(--warn-bg); } .p-tag.nueva{ color:var(--go); background:var(--go-bg); }
  .p-meta{ font-size:.72rem; color:var(--muted); }
  .pet .p-txt{ font-size:.92rem; color:var(--ink); }
  .pet-empty{ color:var(--muted); font-style:italic; padding:20px 0; text-align:center; }

  .howto{ background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:6px 22px; margin-top:24px; }
  .howto summary{ cursor:pointer; font-weight:800; font-size:.88rem; padding:14px 0; list-style:none; color:var(--muted); }
  .howto summary::-webkit-details-marker{ display:none; }
  .howto ol{ margin:0 0 16px; padding-left:20px; font-size:.9rem; color:var(--ink); line-height:1.7; }

  .foot{ margin-top:30px; font-size:.72rem; color:var(--muted); text-align:center; }
  .loading, .errbox{ text-align:center; padding:80px 20px; color:var(--muted); }
  .errbox b{ color:var(--stop); }

  /* login */
  .login{ display:flex; justify-content:center; padding:70px 20px; }
  .login-card{ background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:36px 32px; max-width:360px; width:100%; text-align:center; }
  .login-ico{ font-size:2rem; }
  .login-h{ font-size:1.15rem; font-weight:800; margin:12px 0 4px; color:var(--ink); }
  .login-p{ font-size:.88rem; color:var(--muted); margin:0 0 20px; }
  .login-input{ width:100%; padding:12px 14px; font-size:1rem; border:1px solid var(--line); border-radius:var(--r-sm); background:var(--wash); color:var(--ink); font-family:inherit; margin-bottom:12px; }
  .login-input:focus{ outline:2px solid var(--navy); border-color:transparent; }
  .login-btn{ width:100%; padding:12px; font-size:.95rem; font-weight:800; color:#fff; background:var(--navy); border:none; border-radius:var(--r-sm); cursor:pointer; font-family:inherit; }
  .login-btn:active{ transform:scale(.98); }
  .login-err{ margin-top:14px; font-size:.85rem; color:var(--stop); font-weight:600; }

  @media (max-width:820px){ .kpis{ grid-template-columns:repeat(2,1fr); } .grid2{ grid-template-columns:1fr; } }
  @media (max-width:460px){ .bar-row{ grid-template-columns:96px 1fr 40px; } }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>EduTrauma Tools · Panel</h1>
      <div class="sub" id="sub">Cargando…</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="refresh" id="btnSalir" onclick="logout()" style="display:none">Salir</button>
      <button class="refresh" onclick="load()">↻ Actualizar</button>
    </div>
  </header>
  <div id="app"><div class="loading">Cargando datos…</div></div>
  <div class="foot">Panel interno · datos anónimos y agregados · no compartir el enlace.</div>
</div>

<script>
const URL_BASE = 'https://devn8n.tuescuelademarcas.cl/webhook/et-panel-data';
const KEY_STORE = 'et_panel_key';

function stars(avg){ const full=Math.round(avg); let s=''; for(let i=1;i<=5;i++) s+= i<=full?'★':'☆'; return s; }
function esc(x){ return String(x==null?'':x).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function chart(data){
  const W=720,H=200,padL=32,padR=46,padT=24,padB=30;
  const pw=W-padL-padR, ph=H-padT-padB;
  const vals=data.map(d=>d.users);
  const maxV=Math.max(...vals,1);
  let step, top;
  if(maxV<=5){ step=1; top=maxV; }
  else { const rough=maxV/4, mag=Math.pow(10,Math.floor(Math.log10(rough))), u=rough/mag; step=(u<=1?1:u<=2?2:u<=5?5:10)*mag; top=Math.ceil(maxV/step)*step; }
  const X=i=>padL+(data.length<2?0:i*(pw/(data.length-1)));
  const Y=v=>padT+ph-(v/top)*ph;
  const tk=[]; for(let v=0; v<=top+1e-6; v+=step) tk.push(Math.round(v));
  const grid=tk.map(t=>`<line x1="${padL}" y1="${Y(t).toFixed(1)}" x2="${W-padR}" y2="${Y(t).toFixed(1)}" stroke="var(--line)" stroke-width="1" ${t===0?'':'stroke-dasharray="3 4"'}/><text x="${padL-8}" y="${(Y(t)+4).toFixed(1)}" text-anchor="end" font-size="12" fill="var(--muted)">${t}</text>`).join('');
  const pts=data.map((d,i)=>[X(i),Y(d.users)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=line+` L${pts[pts.length-1][0].toFixed(1)} ${padT+ph} L${pts[0][0].toFixed(1)} ${padT+ph} Z`;
  const dots=data.map((d,i)=>`<circle cx="${pts[i][0].toFixed(1)}" cy="${pts[i][1].toFixed(1)}" r="3" fill="var(--navy)"><title>${d.day}: ${d.users} ${d.users===1?'usuario':'usuarios'}</title></circle>`).join('');
  const last=data.length-1, peakI=vals.indexOf(maxV), tv=data[last].users;
  let labels='';
  if(maxV>0 && peakI!==last) labels+=`<text x="${X(peakI).toFixed(1)}" y="${(Y(maxV)-9).toFixed(1)}" text-anchor="middle" font-size="13" font-weight="800" fill="var(--ink)">${maxV}</text>`;
  labels+=`<text x="${X(last).toFixed(1)}" y="${(Y(tv)-11).toFixed(1)}" text-anchor="middle" font-size="13" font-weight="800" fill="var(--navy)">${tv}</text>`;
  const todayDot=`<circle cx="${X(last).toFixed(1)}" cy="${Y(tv).toFixed(1)}" r="4.5" fill="var(--navy)" stroke="var(--card)" stroke-width="2"/>`;
  const midI=Math.floor(last/2);
  const xlab=[[0,data[0].day.slice(5),'start'],[midI,data[midI].day.slice(5),'middle'],[last,'hoy','end']].map(([i,t,a])=>`<text x="${X(i).toFixed(1)}" y="${H-8}" text-anchor="${a}" font-size="12" fill="var(--muted)">${t}</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;" font-family="inherit">
    ${grid}
    <path d="${area}" fill="var(--navy)" opacity="0.10"/>
    <path d="${line}" fill="none" stroke="var(--navy)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}${todayDot}${labels}${xlab}
  </svg>`;
}

function bars(items, label){
  const max=Math.max(1,...items.map(i=>i.n));
  return items.map(i=>`<div class="bar-row">
    <div class="bn">${barName(i)}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.max(3,i.n/max*100)}%"></div></div>
    <div class="bv">${i.n}</div>
  </div>`).join('');
}
function barName(i){ return esc(i.name||i.pais||i.prof||i.fuente); }

function kpi(name, val, sub, pill){
  return `<div class="kpi"><div class="k-top"><span class="k-name">${name}</span>${pill?`<span class="pill ${pill.c}">${pill.t}</span>`:''}</div>
    <div class="k-val">${val}</div><div class="k-sub">${sub||''}</div></div>`;
}

function render(d){
  const retPill = d.retention>=25?{c:'go',t:'meta ✓'}:{c:'warn',t:'meta 25%'};
  const actPill = d.activation>=50?{c:'go',t:'meta ✓'}:{c:'warn',t:'meta 50%'};
  const langsArr=[{name:'Español',n:d.langs.es},{name:'English',n:d.langs.en},{name:'Português',n:d.langs.pt}];

  const ratingsHTML = d.ratings.map(r=> r.avg!=null
    ? `<div class="rate-row"><div class="rn">${esc(r.name)}</div>
        <div class="rate-val"><span class="rate-num">${r.avg.toFixed(1)}</span><span class="rate-stars" style="color:var(--warn)">${stars(r.avg)}</span><span class="rate-n">${r.n}</span></div></div>`
    : `<div class="rate-row"><div class="rn">${esc(r.name)}</div><div class="rate-empty">sin respuestas aún</div></div>`
  ).join('');

  const petCard = p => `<div class="pet"><div class="p-top">
        <span class="p-meta">${esc(p.fecha)} · ${esc(p.tool)} · ${esc(p.esp||'—')} · ${esc(p.pais||'—')}</span>
      </div><div class="p-txt">${esc(p.texto)}</div></div>`;
  const nuevas = d.peticiones.filter(p=>p.tipo==='Herramienta nueva');
  const mejoras = d.peticiones.filter(p=>p.tipo!=='Herramienta nueva');
  const petGroup = (arr, vacio) => arr.length ? arr.map(petCard).join('') : `<div class="pet-empty">${vacio}</div>`;

  document.getElementById('app').innerHTML = `
    ${(()=>{
      const V={
        wait:{word:'Aún es pronto para saber', why:`Solo hay <b>${d.users} usuarios</b>: muy pocos para concluir. Ahora el trabajo es <b>distribuir y traer gente</b>, todavía no cambiar la app.`},
        go:{word:'Hay tracción — vale la pena invertir más', why:`<b>${d.retention}%</b> vuelve otro día y <b>${d.activation}%</b> llega a un resultado — ambos sobre la meta. La gente <b>la usa y regresa</b>: suma más herramientas y empuja la difusión.`},
        weak:{word:'Tracción débil — mejora antes de escalar', why:`<b>${d.retention}%</b> de la gente vuelve otro día (meta 25%) y <b>${d.activation}%</b> llega a un resultado (meta 50%). Hay interés, pero <b>pocos regresan</b>. Antes de gastar en difusión masiva, atiende lo que piden más abajo.`},
        stop:{word:'Sin tracción — hay que replantear', why:`Solo <b>${d.retention}%</b> vuelve otro día. La gente entra una vez y <b>no regresa</b>: el formato no está enganchando; conviene replantear antes de invertir.`}
      };
      const v=V[d.verdict.level]||V.weak;
      const ic=d.verdict.level==='go'?'🟢':d.verdict.level==='stop'?'🔴':'🟡';
      return `<div class="verdict ${d.verdict.level}">
        <div class="dot">${ic}</div>
        <div>
          <div class="lbl">El veredicto — ¿vale la pena seguir invirtiendo en estas herramientas?</div>
          <div class="txt">${v.word}</div>
          <div class="v-why">${v.why}</div>
        </div>
      </div>`;
    })()}

    <h2>¿Cuánta gente la usa?</h2>
    <div class="kpis">
      ${kpi('Usuarios únicos', d.users, `<b>${d.u7}</b> esta semana · <b>${d.u30}</b> este mes`)}
      ${kpi('Vuelven otro día', d.retention+'%', `<b>${d.returned}</b> personas · la métrica que decide`, retPill)}
      ${kpi('Llegan a un resultado', d.activation+'%', 'de los que entran usan la app de verdad', actPill)}
      ${kpi('Países', d.countries, 'se está esparciendo')}
    </div>

    <div class="grid2" style="margin-top:14px;">
      <div class="panel">
        <h3>Actividad — usuarios por día</h3>
        <p class="hint">Últimos 14 días. Lo que quieres ver: la línea subiendo.</p>
        <div class="spark-wrap">${chart(d.spark)}</div>
      </div>
      <div class="panel">
        <h3>¿Les sirve? — nota 1 a 5</h3>
        <p class="hint">Lo que respondieron en la encuesta.</p>
        ${ratingsHTML}
      </div>
    </div>

    <div class="grid2" style="margin-top:14px;">
      <div class="panel">
        <h3>Uso por herramienta</h3>
        <p class="hint">Resultados entregados por cada una.</p>
        ${bars(d.usoTool)}
      </div>
      <div class="panel">
        <h3>Idioma de uso</h3>
        <p class="hint">Personas por idioma. Confirma si el trilingüe se está usando.</p>
        ${bars(langsArr)}
      </div>
    </div>

    <h2>¿De dónde y quiénes son?</h2>
    <div class="grid2">
      <div class="panel">
        <h3>Países — top</h3>
        <p class="hint">Personas distintas por país. ${d.countries} países en total.</p>
        ${d.paises && d.paises.length ? bars(d.paises) : '<div class="pet-empty">Sin datos aún.</div>'}
      </div>
      <div class="panel">
        <h3>Profesiones</h3>
        <p class="hint">Personas por especialidad declarada.${d.sinProf ? ` <b>${d.sinProf}</b> no la indicaron.` : ''}</p>
        ${d.profesiones && d.profesiones.length ? bars(d.profesiones) : '<div class="pet-empty">Nadie ha declarado su profesión aún.</div>'}
        ${d.otras && d.otras.length ? `<div class="otras-wrap">
          <div class="otras-head">↳ Otra — ${d.otrasTotal} ${d.otrasTotal===1?'persona escribió':'personas escribieron'} lo suyo</div>
          <div class="otras-list">${d.otras.map(o=>`<span class="chip ${o.prof==='(sin especificar)'?'mute':''}">${esc(o.prof)}${o.n>1?`<span class="cn">×${o.n}</span>`:''}</span>`).join('')}</div>
        </div>` : ''}
      </div>
    </div>

    <h2>¿Cómo nos conocieron?</h2>
    <div class="panel">
      <p class="hint">De «¿Cómo nos conociste?» en el hub. ${d.fuentesTotal||0} de ${d.users} respondieron. ${d.fuentesTotal ? 'Muestra qué canal trae más gente.' : 'Aún nadie ha respondido — empezará a llenarse con los nuevos ingresos.'}</p>
      ${d.fuentes && d.fuentes.length ? bars(d.fuentes) : '<div class="pet-empty">Sin respuestas todavía.</div>'}
    </div>

    <h2>📋 Lo que piden tus usuarios — tu lista de tareas</h2>
    <div class="grid2">
      <div class="panel">
        <h3>🆕 Herramientas nuevas <span class="pcount">${nuevas.length}</span></h3>
        <p class="hint">Pregunta: «¿Qué otra herramienta te gustaría?»</p>
        ${petGroup(nuevas, 'Nadie ha pedido una herramienta nueva todavía.')}
      </div>
      <div class="panel">
        <h3>🔧 Por mejorar <span class="pcount">${mejoras.length}</span></h3>
        <p class="hint">Pregunta: «¿Le agregarías algo?»</p>
        ${petGroup(mejoras, 'Nadie ha pedido una mejora todavía.')}
      </div>
    </div>

    <details class="howto">
      <summary>ℹ️ Cómo leer este panel</summary>
      <ol>
        <li><b>Mira el veredicto</b> (arriba). Te dice qué hacer, sin que tengas que interpretar números.</li>
        <li>Si dice <b>"pocos datos"</b>: tu trabajo es distribuir, no cambiar la app.</li>
        <li>El número que más importa es <b>"vuelven otro día"</b> (retención). Arriba de 25% = tienes algo real.</li>
        <li>Si la gente vuelve pero la nota es baja → mira <b>"lo que piden"</b> y mejora eso.</li>
        <li>Revísalo <b>una vez por semana</b>, no todos los días — el ruido diario confunde.</li>
      </ol>
    </details>`;

  const t=new Date(d.generated);
  document.getElementById('sub').textContent = `${d.total_events.toLocaleString('es')} eventos · actualizado ${t.toLocaleString('es-CL',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'})}`;
}

function showLogin(msg){
  document.getElementById('btnSalir').style.display='none';
  document.getElementById('sub').textContent = 'Acceso restringido — solo el equipo';
  document.getElementById('app').innerHTML = `
    <div class="login"><div class="login-card">
      <div class="login-ico">🔒</div>
      <div class="login-h">Panel del equipo EduTrauma</div>
      <p class="login-p">Ingresa la clave de acceso para ver los datos.</p>
      <input id="pw" type="password" class="login-input" placeholder="Clave" autocomplete="current-password">
      <button class="login-btn" onclick="doLogin()">Entrar</button>
      ${msg?`<div class="login-err">${msg}</div>`:''}
    </div></div>`;
  const pw=document.getElementById('pw'); pw.focus();
  pw.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
}
function doLogin(){
  const v=document.getElementById('pw').value.trim();
  if(!v) return;
  localStorage.setItem(KEY_STORE, v);
  load();
}
function logout(){ localStorage.removeItem(KEY_STORE); showLogin(''); }

function load(){
  const key = localStorage.getItem(KEY_STORE);
  if(!key){ showLogin(''); return; }
  document.getElementById('app').innerHTML = '<div class="loading">Cargando datos…</div>';
  fetch(URL_BASE+'?k='+encodeURIComponent(key), {cache:'no-store'})
    .then(r=>r.json())
    .then(d=>{
      if(d.error==='no-auth'){ localStorage.removeItem(KEY_STORE); showLogin('Clave incorrecta. Intenta de nuevo.'); return; }
      if(d.error) throw new Error(d.error);
      document.getElementById('btnSalir').style.display='';
      render(d);
    })
    .catch(e=>{ document.getElementById('app').innerHTML = `<div class="errbox"><b>No se pudieron cargar los datos.</b><br>Revisa que el servidor n8n esté activo.<br><small>${esc(e.message)}</small></div>`; });
}
load();
setInterval(load, 5*60*1000); // auto-refresca cada 5 min
</script>
</body>
</html>

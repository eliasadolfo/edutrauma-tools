/* ============ Analytics + cola offline ============ */
const ET_EVENTS_URL = 'https://devn8n.tuescuelademarcas.cl/webhook/et-tools-event';
function etEnqueue(p){ try{ const q=JSON.parse(localStorage.getItem('et_queue')||'[]'); q.push(p); while(q.length>200)q.shift(); localStorage.setItem('et_queue',JSON.stringify(q)); }catch(e){} }
function etPost(p){ return fetch(ET_EVENTS_URL,{method:'POST',keepalive:true,headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}).then(r=>{if(!r.ok)throw new Error('http');}); }
function etFlush(){ let q=[]; try{q=JSON.parse(localStorage.getItem('et_queue')||'[]');}catch(e){} if(!q.length)return; try{localStorage.setItem('et_queue','[]');}catch(e){} q.forEach(p=>etPost(p).catch(()=>etEnqueue(p))); }
window.addEventListener('online', etFlush); etFlush();
function etAnonId(){ let id=localStorage.getItem('et_anon'); if(!id){ id=(crypto.randomUUID?crypto.randomUUID():'a-'+Date.now()+'-'+Math.random().toString(36).slice(2)); localStorage.setItem('et_anon',id);} return id; }
function sendEvent(event, extra){
  try{
    let p={}; try{ p=JSON.parse(localStorage.getItem('et_profile')||'{}'); }catch(e){}
    const __p={ ts:new Date().toISOString(), anon_id:etAnonId(), event, tool:'aast',
      lang:LANG, country:p.country||'', specialty:p.specialty||'',
      tz:(Intl.DateTimeFormat().resolvedOptions().timeZone||''), ua:navigator.userAgent.slice(0,180), extra:extra||{} };
    etPost(__p).catch(()=>etEnqueue(__p));
  }catch(e){}
}

function detectLang(){ const s=localStorage.getItem('lang'); if(s&&UI[s])return s; const n=(navigator.language||'es').toLowerCase(); if(n.startsWith('pt'))return'pt'; if(n.startsWith('en'))return'en'; return'es'; }

function applyStatic(){ const u=U(); document.documentElement.lang=u.htmlLang; document.getElementById('brandRibbon').textContent=u.ribbon; document.getElementById('appTitle').textContent=u.title; document.getElementById('appSubtitle').textContent=u.subtitle; document.getElementById('appFooter').innerHTML=u.footer; if(typeof refreshInstallBanner==='function') refreshInstallBanner(); }

function setHeader(show){ document.getElementById('appHeader').style.display=show?'':'none'; }

/* ---------- HOME ---------- */
function renderHome(filter){
  setHeader(true);
  
  document.getElementById('progressWrap').style.display='none';
  const u=U(); filter=(filter||'').trim().toLowerCase();
  let regionsHTML='';
  DB.regionOrder.forEach(region=>{
    const organs=Object.entries(DB.organs).filter(([k,o])=>o.region===region && (!filter || tr(o.name).toLowerCase().includes(filter) || tr(region).toLowerCase().includes(filter)));
    if(!organs.length) return;
    regionsHTML+=`<div class="region-block"><div class="region-title">${tr(region)}</div><div class="organ-grid">`;
    organs.forEach(([k,o])=>{ regionsHTML+=`<button class="organ-btn" onclick="openOrgan('${k}')">${tr(o.name)}</button>`; });
    regionsHTML+=`</div></div>`;
  });
  if(!regionsHTML) regionsHTML=`<p style="text-align:center;color:var(--et-muted);padding:30px 0;">${u.noResults}</p>`;
  document.getElementById('main').innerHTML=`
    <input class="aast-search" id="aastSearch" placeholder="${u.search}" value="${filter?filter:''}" oninput="renderHome(this.value); requeryFocus();">
    ${regionsHTML}
    ${window.etToolFooter ? etToolFooter(u.hubLink, u.fbLink) : ''}`;
}
function requeryFocus(){ const el=document.getElementById('aastSearch'); if(el){ const v=el.value; el.focus(); el.setSelectionRange(v.length,v.length);} }

function openOrgan(key){
  state={ organKey:key, categoryKey:null, optionIndex:null, tMulti:false, tInc:false, tDec:false };
  sendEvent('aast_organ_open',{ organ:key });
  const o=DB.organs[key];
  if(o.mode==='typed'){ renderCategories(); } else { renderOptions(); }
}

function renderCategories(){
  setHeader(false); window.scrollTo(0,0);

  document.getElementById('main').innerHTML=`
    <div class="back-row"><button class="back-btn" onclick="renderHome('')">${u.backOrgans}</button></div>
    <div class="category-badge">${orgIcon()}<span>${tr(o.name)}</span></div>
    <div class="question-text" style="margin-bottom:16px;">${u.pickType}</div>
    <div class="organ-grid">${cats}</div>`;
}
function pickCategory(ckey){ state.categoryKey=ckey; renderOptions(); }

/* ---------- OPCIONES ---------- */
function selectedItems(){ const o=DB.organs[state.organKey]; if(o.mode==='typed'){ const c=o.categories.find(c=>c.key===state.categoryKey); return c?c.items:[]; } return o.items; }
function renderOptions(){
  setHeader(false); window.scrollTo(0,0);
  const u=U(); const o=DB.organs[state.organKey]; const items=selectedItems();
  document.getElementById('progressWrap').style.display='none';
  const backFn = o.mode==='typed' ? 'renderCategories()' : "renderHome('')";
  const list=items.map((it,i)=>`
    <button class="opt" onclick="pickOption(${i})">
      <span class="opt-grade">${ROMAN[it.grade]}</span>
      <span>${tr(it.label)}${it.warn?`<span class="opt-warn">⚠ ${u.warnVerify}</span>`:''}</span>
    </button>`).join('');
  document.getElementById('main').innerHTML=`
    <div class="back-row"><button class="back-btn" onclick="${backFn}">${u.back}</button></div>
    <div class="category-badge">${orgIcon()}<span>${tr(o.name)}</span></div>
    <div class="question-text" style="margin-bottom:14px;">${u.pickInjury}</div>
    <div class="opt-list">${list}</div>`;
}
function pickOption(i){ state.optionIndex=i; const o=DB.organs[state.organKey]; if(o.adjust==='none'){ showResult(); } else { renderAdjust(); } }

/* ---------- AJUSTES ---------- */
function renderAdjust(){
  setHeader(false); window.scrollTo(0,0);
  const u=U(); const o=DB.organs[state.organKey];
  let toggles='';
  if(o.adjust==='vessel'){
    toggles=`
      <div class="adjust-toggle ${state.tInc?'on':''}" onclick="state.tInc=!state.tInc; renderAdjust();"><div><div class="at-label">${u.vesselInc}</div><div class="at-sub">${u.vesselUp}</div></div><div class="at-switch"></div></div>
      <div class="adjust-toggle ${state.tDec?'on':''}" onclick="state.tDec=!state.tDec; renderAdjust();"><div><div class="at-label">${u.vesselDec}</div><div class="at-sub">${u.vesselDown}</div></div><div class="at-switch"></div></div>`;
  } else {
    let label,sub;
    if(o.adjust==='multiple3'){ label=u.adjMultiple; sub=u.upTo3; }
    else if(o.adjust==='bilateral3'){ label=u.adjBilateral; sub=u.upTo3; }
    else if(o.adjust==='bilateral5'){ label=u.adjBilateral; sub=u.upTo5; }
    else { label=o.adjustLabel?tr(o.adjustLabel):u.adjMultiple; sub=u.up1; }
    toggles=`<div class="adjust-toggle ${state.tMulti?'on':''}" onclick="state.tMulti=!state.tMulti; renderAdjust();"><div><div class="at-label">${label}</div><div class="at-sub">${sub}</div></div><div class="at-switch"></div></div>`;
  }
  document.getElementById('main').innerHTML=`
    <div class="back-row"><button class="back-btn" onclick="renderOptions()">${u.back}</button></div>
    <div class="category-badge">${orgIcon()}<span>${tr(o.name)}</span></div>
    <div class="question-text" style="margin-bottom:14px;">${u.adjustTitle}</div>
    <div class="adjust-box">${toggles}</div>
    <button class="start-btn" style="margin-top:18px;" onclick="showResult()">${u.seeResult}</button>`;
}

/* ---------- RESULTADO ---------- */
function computeGrade(){
  const o=DB.organs[state.organKey]; const item=selectedItems()[state.optionIndex];
  let g=item.grade, note='';
  const u=U();
  if(o.adjust==='multiple3'||o.adjust==='bilateral3'){ if(state.tMulti&&g<3){ g+=1; note=o.adjust==='multiple3'?u.adjNote3:u.adjNoteBil3; } }
  else if(o.adjust==='bilateral5'){ if(state.tMulti&&g<5){ g+=1; note=u.adjNoteBil5; } }
  else if(o.adjust==='multiple_nocap'){ if(state.tMulti&&g<o.maxGrade){ g+=1; note=u.adjNoteMulti; } }
  else if(o.adjust==='vessel'){ if(state.tInc&&(g===3||g===4)){ g+=1; note+=u.adjNoteVup+' '; } if(state.tDec&&(g===4||g===5)){ g-=1; note+=u.adjNoteVdown; } }
  return { grade:g, note:note.trim(), item };
}
function showResult(){
  setHeader(false); window.scrollTo(0,0);
  const u=U(); const o=DB.organs[state.organKey]; const r=computeGrade();
  sendEvent('aast_result',{ organ:state.organKey, grade:r.grade });
  if(window.etFbAfterUse) etFbAfterUse();
  const backFn = o.adjust==='none' ? 'renderOptions()' : 'renderAdjust()';
  document.getElementById('main').innerHTML=`
    <div class="back-row"><button class="back-btn" onclick="${backFn}">${u.back}</button></div>
    <div class="result-card bjorck" style="justify-content:center;">
      <div class="grade-hero grade-g${r.grade}">${ROMAN[r.grade]}</div>
      <div class="grade-roman">${u.result}</div>
      <div class="result-title" style="font-size:1.05rem;">${tr(o.name)}</div>
      <div class="result-detail">${tr(r.item.label)}</div>
      ${r.note?`<div class="caution-box">${r.note}</div>`:''}
      ${r.item.warn?`<div class="caution-box">⚠ ${u.warnVerify}</div>`:''}
      <div class="code-row">
        ${r.item.icd9?`<div class="code-chip"><b>ICD-9</b>${r.item.icd9}</div>`:''}
        ${r.item.ais?`<div class="code-chip"><b>AIS-90</b>${r.item.ais}</div>`:''}
      </div>
    </div>
    <button class="restart-btn" onclick="renderHome('')">${u.restart}</button>`;
}

function orgIcon(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h4l2 6 4-14 2 8h6"/></svg>'; }

function setLang(lang){ LANG=lang; localStorage.setItem('lang',lang); applyStatic(); renderHome(document.getElementById('aastSearch')?document.getElementById('aastSearch').value:''); }

/* ---------- Gate de especialidad (compartido con el hub) ---------- */
function needSpecialty(){ try{ const p=JSON.parse(localStorage.getItem('et_profile')||'{}'); return !p.specialty; }catch(e){ return true; } }
function renderSpecialtyGate(){
  setHeader(false);
  const specs=SPECIALTIES[LANG];
  const chips=specs.map(s=>`<button onclick="pickSpec(this.textContent)">${s}</button>`).join('');
  document.getElementById('main').innerHTML=`
    <div class="card">
      <div class="question-text">${SPEC_T[LANG].title}</div>
      <p class="spec-sub">${SPEC_T[LANG].sub}</p>
      <div class="spec-grid">${chips}</div>
    </div>`;
}
function pickSpec(s){
  const specs=SPECIALTIES[LANG];
  if(s===specs[specs.length-1]){
    document.getElementById('main').innerHTML=`
      <div class="card"><div class="question-text">${SPEC_T[LANG].title}</div>
      <input class="spec-input" id="specOther" maxlength="60" placeholder="${SPEC_T[LANG].ph}" oninput="document.getElementById('specGo').disabled=!this.value.trim()">
      <button class="spec-continue" id="specGo" disabled onclick="saveSpec(document.getElementById('specOther').value.trim())">${SPEC_T[LANG].cont}</button></div>`;
    setTimeout(()=>document.getElementById('specOther').focus(),100); return;
  }
  saveSpec(s);
}
function saveSpec(s){ if(!s)return; let p={}; try{p=JSON.parse(localStorage.getItem('et_profile')||'{}');}catch(e){} p.specialty=s.slice(0,60); localStorage.setItem('et_profile',JSON.stringify(p)); sendEvent('profile_saved',{specialty:p.specialty}); renderHome(''); }
const SPECIALTIES={ es:["Cirugía general","Cirugía de trauma","Residente de cirugía","Medicina de urgencia","Enfermería","Estudiante de medicina","Otra"], en:["General surgery","Trauma surgery","Surgery resident","Emergency medicine","Nursing","Medical student","Other"], pt:["Cirurgia geral","Cirurgia do trauma","Residente de cirurgia","Medicina de emergência","Enfermagem","Estudante de medicina","Outra"] };
const SPEC_T={ es:{title:"¿Cuál es tu especialidad?",sub:"Un toque, solo una vez — nos ayuda a crear las herramientas que tu práctica necesita.",ph:"Escríbela aquí… (ej: Veterinaria)",cont:"Continuar ›"}, en:{title:"What is your specialty?",sub:"One tap, just once — it helps us build the tools your practice needs.",ph:"Type it here… (e.g. Veterinary)",cont:"Continue ›"}, pt:{title:"Qual é a sua especialidade?",sub:"Um toque, só uma vez — nos ajuda a criar as ferramentas que a sua prática precisa.",ph:"Escreva aqui… (ex: Veterinária)",cont:"Continuar ›"} };

/* ---------- Instalación PWA (Android prompt / iOS guía) ---------- */
let deferredPrompt=null;
const IS_IOS=/iPhone|iPad|iPod/.test(navigator.userAgent)||(/Macintosh/.test(navigator.userAgent)&&'ontouchend' in document);
const IS_STANDALONE=(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)||window.navigator.standalone===true;
function ensureBanner(){ if(document.getElementById('installBanner'))return; const b=document.createElement('div'); b.className='install-banner'; b.id='installBanner'; b.innerHTML='<span id="installText"></span><button id="installBtn"></button><button class="close-x" onclick="dismissInstall()" aria-label="Cerrar">✕</button>'; document.querySelector('.brand-ribbon').after(b); }
function refreshInstallBanner(){ ensureBanner(); const banner=document.getElementById('installBanner'); const u=U(); if(IS_STANDALONE||localStorage.getItem('installDismissed')==='1'){ banner.classList.remove('show'); return; } const btn=document.getElementById('installBtn'); if(IS_IOS){ document.getElementById('installText').innerHTML=u.installIOSShort; btn.style.display=''; btn.textContent=u.iosHow; btn.onclick=showIOSGuide; banner.classList.add('show'); } else if(deferredPrompt){ document.getElementById('installText').innerHTML=u.installText; btn.style.display=''; btn.textContent=u.installBtn; btn.onclick=promptInstall; banner.classList.add('show'); } else { banner.classList.remove('show'); } }
window.addEventListener('beforeinstallprompt',(e)=>{ e.preventDefault(); deferredPrompt=e; refreshInstallBanner(); });
window.addEventListener('appinstalled',()=>{ sendEvent('pwa_installed'); const b=document.getElementById('installBanner'); if(b)b.classList.remove('show'); });
function promptInstall(){ if(!deferredPrompt)return; deferredPrompt.prompt(); deferredPrompt.userChoice.finally(()=>{ deferredPrompt=null; refreshInstallBanner(); }); }
function dismissInstall(){ try{localStorage.setItem('installDismissed','1');}catch(e){} document.getElementById('installBanner').classList.remove('show'); }
function showIOSGuide(){ const u=U(); let ov=document.getElementById('iosOverlay'); if(!ov){ ov=document.createElement('div'); ov.id='iosOverlay'; ov.className='overlay'; ov.onclick=(e)=>{if(e.target===ov)ov.classList.remove('show');}; document.body.appendChild(ov);} ov.innerHTML=`<div class="sheet"><h2>${u.iosTitle}</h2>${u.iosSteps.map((s,i)=>`<div class="rule-item"><div class="rule-dot"></div><div><b>${i+1}.</b> ${s}</div></div>`).join('')}<button class="close-sheet" onclick="document.getElementById('iosOverlay').classList.remove('show')">${u.iosDone}</button></div>`; ov.classList.add('show'); sendEvent('ios_guide_open'); }

/* ---------- Init ---------- */
if(window.etFbInit) etFbInit('aast','Escalas AAST');
applyStatic();
if(needSpecialty()){ renderSpecialtyGate(); } else { renderHome(''); }
sendEvent('app_open');
refreshInstallBanner();
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  const hadController = !!navigator.serviceWorker.controller;
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing || !hadController) return; // recarga UNA vez cuando llega versión nueva
    refreshing = true;
    location.reload();
  });
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then((reg) => {
      reg.update();
      setInterval(() => reg.update(), 60000); // busca actualización cada minuto mientras esté abierta
    }).catch(() => {});
  });
}
</script>
</body>
</html>

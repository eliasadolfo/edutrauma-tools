/* ============ Analytics (anónimo, compartido con el hub) ============ */
const ET_EVENTS_URL = 'https://devn8n.tuescuelademarcas.cl/webhook/et-tools-event';
function etAnonId(){
  let id = localStorage.getItem('et_anon');
  if (!id){
    id = (crypto.randomUUID ? crypto.randomUUID() : 'a-' + Date.now() + '-' + Math.random().toString(36).slice(2));
    localStorage.setItem('et_anon', id);
  }
  return id;
}
function sendEvent(event, extra){
  try{
    let p = {}; try{ p = JSON.parse(localStorage.getItem('et_profile') || '{}'); }catch(e){}
    fetch(ET_EVENTS_URL, {
      method: 'POST', keepalive: true,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        ts: new Date().toISOString(), anon_id: etAnonId(), event: event, tool: 'abdomen',
        lang: (typeof LANG !== 'undefined' ? LANG : ''), country: p.country || '', specialty: p.specialty || '',
        tz: (Intl.DateTimeFormat().resolvedOptions().timeZone || ''), ua: navigator.userAgent.slice(0, 180),
        extra: extra || {}
      })
    }).catch(() => {});
  }catch(e){}
}

const LANG_NAMES = { es: "Español", en: "English", pt: "Português" };

function detectLang(){
  const saved = localStorage.getItem('lang');
  if (saved && I18N[saved]) return saved;
  const nav = (navigator.language || 'es').toLowerCase();
  if (nav.startsWith('pt')) return 'pt';
  if (nav.startsWith('en')) return 'en';
  return 'es';
}

let LANG = detectLang();
function T(){ return I18N[LANG]; }

const LANGS = ['es', 'en', 'pt'];

function setLang(lang){
  LANG = lang;
  localStorage.setItem('lang', lang);
  applyStaticTexts();

  // Si estamos en la pantalla de inicio, actualizar en sitio para que
  // el thumb DESLICE (un re-render mataría la animación).
  const sw = document.getElementById('langSwitch');
  if (sw){
    sw.dataset.active = LANGS.indexOf(lang);
    sw.querySelectorAll('button').forEach((b, i) => {
      b.classList.toggle('active', LANGS[i] === lang);
      b.setAttribute('aria-pressed', LANGS[i] === lang);
    });
    const t = T();
    document.getElementById('startRules').innerHTML = startRulesHTML(t);
    document.getElementById('startBtn').textContent = t.startBtn;
  } else {
    renderStart();
  }
}

function startRulesHTML(t){
  return `<h2>${t.rulesHeading}</h2>` + t.rules.map(r =>
    `<div class="rule-item"><div class="rule-dot"></div><div><b>${r[0]}</b> ${r[1]}</div></div>`
  ).join('');
}

function applyStaticTexts(){
  const t = T();
  document.documentElement.lang = t.htmlLang;
  document.title = t.docTitle;
  document.getElementById('brandRibbon').textContent = t.ribbon;
  document.getElementById('appTitle').textContent = t.title;
  document.getElementById('appSubtitle').textContent = t.subtitle;
  document.getElementById('appFooter').innerHTML = t.footer;
  document.getElementById('installText').innerHTML = t.installText;
  document.getElementById('installBtn').textContent = t.installBtn;
}

// Modo flujo: compacta la cabecera para que cada pantalla quepa sin scroll
function setFlow(on){
  document.querySelector('.app').classList.toggle('in-flow', on);
  document.getElementById('progressWrap').style.display = on ? '' : 'none';
  window.scrollTo(0, 0);
}

function renderStart(){
  setFlow(false);
  const t = T();
  const langBtns = LANGS.map(l =>
    `<button class="${l === LANG ? 'active' : ''}" onclick="setLang('${l}')" aria-pressed="${l === LANG}">${LANG_NAMES[l]}</button>`
  ).join('');
  const globe = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.6 3.8 5.7 3.8 9s-1.3 6.4-3.8 9c-2.5-2.6-3.8-5.7-3.8-9s1.3-6.4 3.8-9z"/></svg>';
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="start-rules" id="startRules">${startRulesHTML(t)}</div>
    <div class="anim-pop"><button class="start-btn" id="startBtn" onclick="startFlow()">${t.startBtn}</button></div>
    <div class="lang-wrap">
      ${globe}
      <div class="lang-switch" id="langSwitch" role="group" aria-label="Idioma / Language" data-active="${LANGS.indexOf(LANG)}">
        <div class="lang-thumb"></div>
        ${langBtns}
      </div>
    </div>
  `;
}

function startFlow(){
  currentIndex = 0;
  history = [];
  inBjorckFlow = false;
  bjorckIndex = 0;
  bjorckAnswers = {};
  setFlow(true);
  renderQuestion();
}

function renderQuestion(){
  setFlow(true);
  const t = T();
  const q = t.questions[currentIndex];
  const total = t.questions.length;
  document.getElementById('progressFill').style.width = ((currentIndex)/total*100) + '%';
  document.getElementById('progressText').textContent = t.progressQ(currentIndex+1, total);
  document.getElementById('categoryText').textContent = '';

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="back-row">
      ${history.length ? `<button class="back-btn" onclick="goBack()">${t.backPrev}</button>` : ''}
    </div>
    <div class="category-badge">${ICONS[q.icon]}<span>${q.category}</span></div>
    <div class="card">
      <div class="question-text">${q.text}</div>
      <div class="answers">
        <button class="answer-btn no" onclick="answer('no')">${t.no}</button>
        <button class="answer-btn yes" onclick="answer('yes')">${t.yes}</button>
      </div>
    </div>
  `;
}

function renderResult(result){
  window.scrollTo(0, 0);
  sendEvent('eval_completed', { result: result.result });
  try{ localStorage.setItem('et_evals', String(1 + parseInt(localStorage.getItem('et_evals') || '0', 10))); }catch(e){}
  const t = T();
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = t.progressResult;
  document.getElementById('categoryText').textContent = '';

  const iconOpen = '<svg class="result-icon" viewBox="0 0 24 24" fill="none" stroke="#E02826" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9 9l6 6M15 9l-6 6"/></svg>';
  const iconClosed = '<svg class="result-icon" viewBox="0 0 24 24" fill="none" stroke="#1F7A5C" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-6"/></svg>';

  const isOpen = result.result === 'open';
  const triggerLine = history[history.length-1];
  const triggeringQuestion = t.questions[triggerLine.index];

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="back-row">
      <button class="back-btn" onclick="goBack()">${t.backLast}</button>
    </div>
    <div class="result-card ${isOpen ? 'open' : 'closed'}">
      ${isOpen ? iconOpen : iconClosed}
      <div class="result-eyebrow">${t.eyebrowResult}</div>
      <div class="result-title">${result.title}</div>
      <div class="result-detail">${result.detail}</div>
      <details class="trigger-details">
        <summary><span class="label-closed">${t.seeTrigger}</span><span class="label-open">${t.hideTrigger}</span></summary>
        <div class="trigger-box"><b>${triggeringQuestion.category}</b> — "${triggeringQuestion.text}" → ${t.triggerAnswer}: <b>${triggerLine.answer === 'yes' ? t.yes : t.no}</b></div>
      </details>
    </div>
    ${isOpen ? `<div class="anim-pop"><button class="secondary-btn" onclick="startBjorck()">${t.bjorckBtn}</button></div>` : ''}
    <div class="anim-pop"><button class="restart-btn" onclick="restart()">${t.restartBtn}</button></div>
  `;
}

function startBjorck(){
  inBjorckFlow = true;
  bjorckIndex = 0;
  bjorckAnswers = {};
  renderBjorckQuestion();
}

function renderBjorckQuestion(){
  window.scrollTo(0, 0);
  const t = T();
  const q = t.bjorck[bjorckIndex];
  const total = t.bjorck.length;
  document.getElementById('progressFill').style.width = ((bjorckIndex)/total*100) + '%';
  document.getElementById('progressText').textContent = t.progressBjQ(bjorckIndex+1, total);
  document.getElementById('categoryText').textContent = '';

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="back-row">
      <button class="back-btn" onclick="bjorckBack()">${bjorckIndex===0 ? t.backToResult : t.backPrev}</button>
    </div>
    <div class="category-badge bjorck">${ICONS.bjorck}<span>${t.bjorckBadge}</span></div>
    <div class="card">
      <div class="question-text">${q.text}</div>
      <div class="answers">
        <button class="answer-btn no" onclick="bjorckAnswer('no')">${t.no}</button>
        <button class="answer-btn yes" onclick="bjorckAnswer('yes')">${t.yes}</button>
      </div>
    </div>
  `;
}

function bjorckAnswer(ans){
  const t = T();
  const q = t.bjorck[bjorckIndex];
  bjorckAnswers[q.key] = ans;

  if (q.yesGrade && ans === 'yes'){
    renderBjorckResult(q.yesGrade);
    return;
  }

  if (bjorckIndex < t.bjorck.length - 1){
    bjorckIndex++;
    renderBjorckQuestion();
  } else {
    // Fin: combinar fijación + contaminación
    const fixation = bjorckAnswers.fixation === 'yes';
    const contamination = bjorckAnswers.contamination === 'yes';
    let grade;
    if (!fixation && !contamination) grade = t.grades.g1a;
    else if (!fixation && contamination) grade = t.grades.g1b;
    else if (fixation && !contamination) grade = t.grades.g2a;
    else grade = t.grades.g2b;
    renderBjorckResult(grade);
  }
}

function bjorckBack(){
  if (bjorckIndex === 0){
    inBjorckFlow = false;
    const last = history[history.length-1];
    renderResult(last.outcome);
    return;
  }
  bjorckIndex--;
  renderBjorckQuestion();
}

function renderBjorckResult(grade){
  window.scrollTo(0, 0);
  sendEvent('bjorck_completed', { grade: grade.grade });
  const t = T();
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = t.progressBjResult;
  document.getElementById('categoryText').textContent = '';

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="back-row">
      <button class="back-btn" onclick="startBjorck()">${t.redoBjorck}</button>
    </div>
    <div class="result-card bjorck">
      <div class="result-eyebrow">${t.eyebrowBjorck}</div>
      <div class="grade-pill">${grade.grade}</div>
      <div class="result-title" style="font-size:1.05rem;">${grade.label}</div>
      <div class="result-detail">${grade.detail}</div>
      <div class="caution-box">${t.caution}</div>
    </div>
    <div class="anim-pop"><button class="restart-btn" onclick="restart()">${t.restartBtn}</button></div>
  `;
}

function answer(ans){
  const t = T();
  const q = t.questions[currentIndex];
  const outcome = q[ans];
  history.push({ index: currentIndex, answer: ans, outcome: outcome !== 'next' ? outcome : null });

  if (outcome === 'next'){
    currentIndex++;
    renderQuestion();
  } else {
    renderResult(outcome);
  }
}

function goBack(){
  if (inBjorckFlow){ inBjorckFlow = false; }
  if (history.length === 0) return;
  const last = history.pop();
  currentIndex = last.index;
  renderQuestion();
}


/* ============ Feedback in-app ============ */
let fbUseful = null;

function maybeAskFeedback(){
  try{
    return localStorage.getItem('et_fb_done') !== '1'
      && parseInt(localStorage.getItem('et_evals') || '0', 10) >= 2;
  }catch(e){ return false; }
}

function showFeedback(){
  const t = T();
  fbUseful = null;
  let ov = document.getElementById('fbOverlay');
  if (!ov){
    ov = document.createElement('div');
    ov.id = 'fbOverlay';
    ov.className = 'overlay';
    document.body.appendChild(ov);
  }
  ov.innerHTML = `
    <div class="sheet">
      <h2>${t.fbTitle}</h2>
      <div class="fb-options">
        <button id="fbYes" onclick="fbPick(true)">${t.fbYes}</button>
        <button id="fbNo" onclick="fbPick(false)">${t.fbNo}</button>
      </div>
      <textarea class="fb-comment" id="fbComment" maxlength="500" placeholder="${t.fbPlaceholder}"></textarea>
      <button class="fb-send" id="fbSendBtn" onclick="fbSend()" disabled>${t.fbSend}</button>
      <button class="fb-skip" onclick="fbClose(false)">${t.fbSkip}</button>
    </div>`;
  ov.classList.add('show');
}

function fbPick(useful){
  fbUseful = useful;
  document.getElementById('fbYes').classList.toggle('picked', useful === true);
  document.getElementById('fbNo').classList.toggle('picked', useful === false);
  document.getElementById('fbSendBtn').disabled = false;
}

function fbSend(){
  const comment = (document.getElementById('fbComment').value || '').slice(0, 500);
  sendEvent('feedback', { useful: fbUseful ? 'yes' : 'no', comment: comment });
  try{ localStorage.setItem('et_fb_done', '1'); }catch(e){}
  const t = T();
  document.querySelector('#fbOverlay .sheet').innerHTML = `<div class="fb-thanks">${t.fbThanks}</div>`;
  setTimeout(() => fbClose(true), 1400);
}

function fbClose(sent){
  if (!sent){
    try{ localStorage.setItem('et_fb_done', '1'); }catch(e){}
    sendEvent('feedback_skipped');
  }
  const ov = document.getElementById('fbOverlay');
  if (ov) ov.classList.remove('show');
  renderStart();
}

function restart(){
  currentIndex = 0;
  history = [];
  inBjorckFlow = false;
  bjorckIndex = 0;
  bjorckAnswers = {};
  if (maybeAskFeedback()){ showFeedback(); return; }
  renderStart();
}

applyStaticTexts();
renderStart();
sendEvent('app_open');

/* ============ PWA ============ */
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (localStorage.getItem('installDismissed') !== '1'){
    document.getElementById('installBanner').classList.add('show');
  }
});
function promptInstall(){
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.finally(() => {
    deferredPrompt = null;
    document.getElementById('installBanner').classList.remove('show');
  });
}
function dismissInstall(){
  localStorage.setItem('installDismissed', '1');
  document.getElementById('installBanner').classList.remove('show');
}
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
});

// iOS: no existe beforeinstallprompt — mostrar pista de instalación
(function(){
  const ua = window.navigator.userAgent;
  const isIOS = /iPhone|iPad|iPod/.test(ua);
  const isStandalone = ('standalone' in window.navigator) && window.navigator.standalone;
  if (isIOS && !isStandalone && localStorage.getItem('installDismissed') !== '1'){
    const banner = document.getElementById('installBanner');
    document.getElementById('installText').innerHTML = T().installIOS;
    document.getElementById('installBtn').style.display = 'none';
    banner.classList.add('show');
  }
})();

// Service worker (requiere https)
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
